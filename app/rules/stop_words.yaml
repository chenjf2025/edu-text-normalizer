# 停用词表 - 朗读时需保留或不处理的词
stop_words:
  # 需要保留的中文词汇
  keep_chinese:
    - "已知"
    - "求"
    - "证明"
    - "得"
    - "所以"
    - "因为"
    - "因此"
    - "则"
    - "若"
    - "当"
    - "时"
    - "为"
    - "的"
    - "在"
    - "于"
    - "和"
    - "与"
    - "或"

  # 需要过滤的占位符
  placeholders:
    - "__FRAC__"
    - "__SQRT__"
    - "__SUM__"
    - "__INT__"
    - "__LIM__"
    - "__END__"