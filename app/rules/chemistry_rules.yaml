# 化学规范化规则
chemistry_rules:
  # 常见化合物(中文名称)
  compounds:
    H2O: "水"
    H2SO4: "硫酸"
    HCl: "盐酸"
    HNO3: "硝酸"
    H3PO4: "磷酸"
    NaCl: "氯化钠"
    NaOH: "氢氧化钠"
    Na2CO3: "碳酸钠"
    NaHCO3: "碳酸氢钠"
    CaCO3: "碳酸钙"
    CaO: "氧化钙"
    Ca(OH)2: "氢氧化钙"
    CO2: "二氧化碳"
    CO: "一氧化碳"
    SO2: "二氧化硫"
    SO3: "三氧化硫"
    NO: "一氧化氮"
    NO2: "二氧化氮"
    NH3: "氨气"
    NH4Cl: "氯化铵"
    KOH: "氢氧化钾"
    KCl: "氯化钾"
    MgO: "氧化镁"
    MgCl2: "氯化镁"
    Fe2O3: "氧化铁"
    Fe3O4: "四氧化三铁"
    FeCl2: "氯化亚铁"
    FeCl3: "氯化铁"
    CuO: "氧化铜"
    Cu2O: "氧化亚铜"
    CuSO4: "硫酸铜"
    ZnO: "氧化锌"
    ZnCl2: "氯化锌"
    Al2O3: "氧化铝"
    Al(OH)3: "氢氧化铝"
    SiO2: "二氧化硅"
    MnO2: "二氧化锰"
    KMnO4: "高锰酸钾"
    CH4: "甲烷"
    C2H5OH: "乙醇"
    CH3COOH: "乙酸"
    C6H12O6: "葡萄糖"
    C12H22O11: "蔗糖"

  # 元素符号到中文名
  elements:
    H: "氢"
    He: "氦"
    Li: "锂"
    Be: "铍"
    B: "硼"
    C: "碳"
    N: "氮"
    O: "氧"
    F: "氟"
    Ne: "氖"
    Na: "钠"
    Mg: "镁"
    Al: "铝"
    Si: "硅"
    P: "磷"
    S: "硫"
    Cl: "氯"
    Ar: "氩"
    K: "钾"
    Ca: "钙"
    Fe: "铁"
    Cu: "铜"
    Zn: "锌"
    Ag: "银"
    Au: "金"
    Hg: "汞"
    Pb: "铅"
    Mn: "锰"
    I: "碘"

  # 离子符号
  ions:
    H+: "氢离子"
    Na+: "钠离子"
    K+: "钾离子"
    Ca2+: "钙离子"
    Mg2+: "镁离子"
    Fe2+: "亚铁离子"
    Fe3+: "铁离子"
    Cu2+: "铜离子"
    Zn2+: "锌离子"
    Cl-: "氯离子"
    SO42-: "硫酸根离子"
    NO3-: "硝酸根离子"
    OH-: "氢氧根离子"
    CO32-: "碳酸根离子"
    HCO3-: "碳酸氢根离子"
    NH4+: "铵根离子"