# 物理单位规范化规则
physics_units:
  # 基本单位
  base_units:
    m: "米"
    kg: "千克"
    s: "秒"
    A: "安培"
    K: "开尔文"
    mol: "摩尔"
    cd: "坎德拉"

  # 导出单位
  derived_units:
    Hz: "赫兹"
    N: "牛顿"
    J: "焦耳"
    W: "瓦特"
    V: "伏特"
    Ω: "欧姆"
    F: "法拉"
    Pa: "帕斯卡"
    T: "特斯拉"
    H: "亨利"
    Wb: "韦伯"
    S: "西门子"
    lm: "流明"
    lx: "勒克斯"
    Bq: "贝可勒尔"
    Gy: "戈瑞"
    kat: "开特"

  # 组合单位(带次数)
  composite_units:
    "m/s": "米每秒"
    "m/s²": "米每二次方秒"
    "kg/m³": "千克每立方米"
    "N/m": "牛顿每米"
    "J/s": "焦耳每秒"
    "W/m²": "瓦特每平方米"
    "J/(kg·K)": "焦耳每千克每开尔文"
    "m²": "平方米"
    "m³": "立方米"
    "kg·m²": "千克平方米"
    "A/m²": "安培每平方米"
    "mol/m³": "摩尔每立方米"

  # 单位前缀
  prefixes:
    k: "千"
    M: "兆"
    G: "吉"
    T: "太"
    P: "拍"
    m: "毫"
    μ: "微"
    n: "纳"
    p: "皮"
    c: "厘"
    d: "分"
    h: "百"

  # 数量级读法
  magnitudes:
    "10⁰": ""
    "10¹": "十"
    "10²": "百"
    "10³": "千"
    "10⁶": "百万"
    "10⁹": "十亿"
    "10⁻¹": "十分之一"
    "10⁻²": "百分之一"
    "10⁻³": "千分之一"
    "10⁻⁶": "百万分之一"
    "10⁻⁹": "十亿分之一"