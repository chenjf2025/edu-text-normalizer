# 数学规范化规则
math_rules:
  # 运算符朗读映射
  operators:
    "+": "加"
    "-": "减"
    "*": "乘"
    "/": "除"
    "=": "等于"
    "==": "等于"
    "!=": "不等于"
    "<": "小于"
    ">": "大于"
    "<=": "小于等于"
    ">=": "大于等于"

  # 函数朗读映射
  functions:
    sin: "正弦"
    cos: "余弦"
    tan: "正切"
    cot: "余切"
    sec: "正割"
    csc: "余割"
    arcsin: "反正弦"
    arccos: "反余弦"
    arctan: "反正切"
    log: "对数"
    ln: "自然对数"
    exp: "指数"
    lim: "极限"
    max: "最大值"
    min: "最小值"

  # 特殊结构朗读
  structures:
    frac: "分之"
    sqrt: "根号下"
    root: "次根号下"
    power: "的次方"
    sum: "求和"
    integral: "积分"
    derivative: "导数"
    factorial: "的阶乘"
    abs: "的绝对值"

  # 数字朗读
  numbers:
    "0": "零"
    "1": "一"
    "2": "二"
    "3": "三"
    "4": "四"
    "5": "五"
    "6": "六"
    "7": "七"
    "8": "八"
    "9": "九"
    ".": "点"
    ",": ""